<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Offline — KoalaSave</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#334155;display:flex;min-height:100dvh;align-items:center;justify-content:center;text-align:center;padding:20px}
.card{max-width:400px;width:100%}
.koala{font-size:64px;margin-bottom:16px}
h1{font-size:24px;font-weight:700;color:#1e3a5f;margin-bottom:8px}
p{font-size:15px;line-height:1.5;margin-bottom:24px;color:#64748b}
.btn{display:inline-block;padding:12px 28px;background:#1e3a5f;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent}
.btn:hover{background:#2a4f7a}
</style>
</head>
<body>
<div class="card">
<div class="koala">🐨</div>
<h1>You're offline</h1>
<p>KoalaSave needs an internet connection to work its savings magic. Come back when you're connected!</p>
<button class="btn" onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
